<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    background:
        radial-gradient(circle at top right,#2563eb33,transparent 35%),
        radial-gradient(circle at bottom left,#06b6d433,transparent 35%),
        linear-gradient(135deg,#020617,#0f172a,#111827);
    background-size: cover;
    overflow-x: hidden;
}

.glass{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:28px;
    transition:.35s ease;
    box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.glass:hover{
    transform:translateY(-8px);
    box-shadow:0 35px 80px rgba(37,99,235,.25);
}

.heading{
    color:#fff;
    font-size:2.3rem;
    font-weight:700;
    text-align:center;
}

.heading span{
    color:#3b82f6;
}

input{
    width:100%;
    background:#111827;
    border:1px solid rgba(255,255,255,.08);
    color:#fff;
    transition:.3s;
}

input::placeholder{
    color:#9ca3af;
}

input:focus{
    border-color:#3b82f6 !important;
    box-shadow:0 0 0 5px rgba(59,130,246,.18);
    background:#1e293b;
}

.gradient-btn{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    border:none;
    color:#fff;
    font-weight:600;
    transition:.3s;
}

.gradient-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(37,99,235,.45);
}

nav{
    background:rgba(2,6,23,.75);
    backdrop-filter:blur(18px);
}

a{
    transition:.3s;
}

a:hover{
    color:#3b82f6;
}
  </style>
</head>

<body class="text-white min-h-screen font-sans">

  <nav class="fixed top-0 left-0 w-full z-50 bg-black/30 backdrop-blur-xl border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-3">
      <div
        class="w-11 h-11 rounded-xl bg-gradient-to-r from-blue-600 to-cyan-500 flex items-center justify-center shadow-lg shadow-blue-500/30">
        <i class="fa-solid fa-bolt text-white text-lg"></i>
      </div>

      <div>
        <h1 class="text-gray-400">Authentication</h1>
      </div>
    </a>

    <!-- Right Side -->
    <div class="flex items-center gap-4">

      <a href="login.html"
        class="px-5 py-2 rounded-xl text-gray-300 border border-white/10 hover:bg-white/10 hover:text-white transition-all duration-300">
        Login
      </a>

    </div>

  </div>
</nav>

  <div class="min-h-screen flex items-center justify-center pt-20 px-6">

    <div class="max-w-md w-full">

      <div class="glass border border-white/10 rounded-3xl p-10" id="mainContainer">

        <div id="step1">

          <h2 class="heading">
    Create <span>Account</span>
</h2>

<p class="text-zinc-400 text-center mt-3">
    Welcome! Create your account to continue.
</p>

          <form id="signupForm" class="mt-8 space-y-6" action="/users" method="post">

            <div class="grid grid-cols-2 gap-4">

              <input
                type="text"
                id="firstName"
                placeholder="First name"
                required
                name="name"
                class="w-full px-6 py-5 bg-zinc-900 border border-white/10 rounded-2xl">

              <input
                type="text"
                id="lastName"
                placeholder="Last name"
                required
                name="lastName"
                class="w-full px-6 py-5 bg-zinc-900 border border-white/10 rounded-2xl">

            </div>

            <div class="relative">
    <i class="fa-solid fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>

    <input
    type="email"
    name="email"
    placeholder="Email Address"
    class="pl-14 w-full px-6 py-5 bg-zinc-900 border border-white/10 rounded-2xl">
</div> 

            <div class="relative">
    <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>

    <input
    type="password"
    name="password"
    placeholder="Password"
    class="pl-14 w-full px-6 py-5 bg-zinc-900 border border-white/10 rounded-2xl">
</div>

            <button
type="submit"
class="gradient-btn w-full py-5 rounded-2xl text-lg flex items-center justify-center gap-2">

<i class="fa-solid fa-paper-plane"></i>
Send OTP

</button>

          </form>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
