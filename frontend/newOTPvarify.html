<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varify OTP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); }
    .otp-input { width: 52px; height: 52px; text-align: center; font-size: 1.8rem; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans">


  <div class="min-h-screen flex items-center justify-center pt-20 px-6">
    <div class="max-w-md w-full">
      <div class="glass border border-white/10 rounded-3xl p-10">

        <!-- Password Login -->
        <div>
          <h2 class="text-4xl font-bold text-center mb-2">Welcome</h2>
          <p class="text-zinc-400 text-center mb-8">Enter otp code</p>

          <form action="/newotp" class="space-y-6" method="post">
            <input type="text" id="otp" placeholder="Enter otp code" required name="userotp"
                   class="w-full px-6 py-5 bg-zinc-900 border border-white/10 rounded-2xl focus:border-violet-500 outline-none">
    <input type="hidden" id="email" name="email">
            
            <button type="submit" class="w-full py-5 bg-white text-zinc-900 font-semibold rounded-2xl text-lg">
              Varify OTP
            </button>
          </form>

          <div class="text-center mt-6">
            <button class="text-zinc-400"><a href="form.html">← Back</a></button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
const params = new URLSearchParams(window.location.search)

document.getElementById('email').value =
params.get('email')
</script>
</body>
</html>
