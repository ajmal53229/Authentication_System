<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(16px); }
    .otp-input { width: 52px; height: 52px; text-align: center; font-size: 1.8rem; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans">

  <div class="min-h-screen flex items-center justify-center pt-20 px-6">
    <div class="max-w-md w-full">
      <div class="glass border border-white/10 rounded-3xl p-10">

        <!-- Password Login -->
        <div>
          <h2 class="text-4xl font-bold text-center mb-2">Welcome back</h2>
          <p class="text-zinc-400 text-center mb-8">Please Enter Email & Password to Login</p>

          <form id="loginForm" action="/logined" class="space-y-6" accept="/login" method="post">
            <input type="email" id="email" placeholder="Email address" required name="email"
                   class="w-full px-6 py-5 bg-zinc-900 border border-white/10 rounded-2xl focus:border-violet-500 outline-none">
            <input type="password" id="password" placeholder="Password" required name="password"
                   class="w-full px-6 py-5 bg-zinc-900 border border-white/10 rounded-2xl focus:border-violet-500 outline-none">
            
            <button type="submit" class="w-full py-5 bg-white text-zinc-900 font-semibold rounded-2xl text-lg">
              Login
            </button>
          </form>

          <div class="text-center mt-6">
            <button class="text-violet-400" ><a href="./forgot.html">Forgot Password</a></button>
          </div>
        </div>
      </div>

      <p class="text-center mt-8 text-zinc-400">
        Don't have an account? <a href="form.html" class="text-violet-400">Sign up</a>
      </p>
    </div>
  </div>

  
</body>
</html>
